<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC TAG DATABASE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060b10;
    --surface: #0d1821;
    --surface2: #0f2030;
    --border: #1a3a55;
    --cyan: #00e5ff;
    --cyan2: #00b8d4;
    --green: #00ff8c;
    --orange: #ff6b35;
    --red: #ff3d5a;
    --text: #c8e6ff;
    --muted: #4a7090;
    --mono: 'Share Tech Mono', monospace;
    --ui: 'Exo 2', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--ui); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 9999;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

  header { text-align: center; padding: 32px 0 28px; }
  .logo-badge { display: inline-block; background: var(--cyan); color: var(--bg); font-family: var(--mono); font-size: 10px; font-weight: bold; letter-spacing: 4px; padding: 4px 12px; margin-bottom: 12px; }
  header h1 { font-family: var(--mono); font-size: clamp(22px, 6vw, 36px); color: var(--cyan); letter-spacing: 2px; text-shadow: 0 0 30px rgba(0,229,255,0.5); line-height: 1.1; }
  header h1 span { color: var(--green); text-shadow: 0 0 20px rgba(0,255,140,0.5); }
  .header-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 3px; margin-top: 8px; }
  .header-line { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); margin-top: 24px; opacity: 0.4; }

  .status-bar { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--cyan); padding: 10px 14px; margin-bottom: 20px; font-family: var(--mono); font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all 0.3s; }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #status-text { color: var(--text); flex: 1; }

  .scan-btn { width: 100%; padding: 18px; background: transparent; border: 2px solid var(--cyan); color: var(--cyan); font-family: var(--mono); font-size: 15px; letter-spacing: 4px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s; margin-bottom: 24px; text-transform: uppercase; }
  .scan-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,229,255,0.1), transparent); transition: left 0.5s; }
  .scan-btn:hover::before { left: 100%; }
  .scan-btn:hover { background: rgba(0,229,255,0.08); box-shadow: 0 0 20px rgba(0,229,255,0.2); }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--muted); color: var(--muted); }
  .scan-btn.scanning { border-color: var(--green); color: var(--green); animation: scanAnim 2s infinite; }
  @keyframes scanAnim { 0%,100%{box-shadow:0 0 10px rgba(0,255,140,0.2)} 50%{box-shadow:0 0 30px rgba(0,255,140,0.5)} }

  .nfc-unsupported { background: rgba(255,61,90,0.08); border: 1px solid rgba(255,61,90,0.3); border-left: 3px solid var(--red); padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: #ff8fa3; margin-bottom: 20px; display: none; }

  .section-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 4px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--muted); }
  #search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 13px; padding: 10px 12px 10px 36px; outline: none; transition: border-color 0.2s; }
  #search-input:focus { border-color: var(--cyan); }
  #search-input::placeholder { color: var(--muted); }

  #tag-list { display: flex; flex-direction: column; gap: 8px; }
  .tag-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--cyan2); padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .tag-card:hover { border-left-color: var(--cyan); background: var(--surface2); }
  .tag-card.highlight { border-left-color: var(--green); animation: highlight 2s ease; }
  @keyframes highlight { 0%{background:rgba(0,255,140,0.15)} 100%{background:var(--surface)} }
  .tag-icon { width: 36px; height: 36px; background: rgba(0,229,255,0.08); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .tag-info { flex: 1; min-width: 0; }
  .tag-name { font-family: var(--ui); font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tag-uid { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: 1px; }
  .tag-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
  .tag-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-icon { width: 30px; height: 30px; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.2s; }
  .btn-icon:hover { border-color: var(--cyan); color: var(--cyan); }
  .btn-icon.delete:hover { border-color: var(--red); color: var(--red); }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 2px; border: 1px dashed var(--border); }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; text-align: center; }
  .stat-val { font-family: var(--mono); font-size: 24px; color: var(--cyan); text-shadow: 0 0 15px rgba(0,229,255,0.4); }
  .stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(6,11,16,0.92); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--cyan); box-shadow: 0 0 40px rgba(0,229,255,0.15); padding: 28px; width: 100%; max-width: 400px; animation: modalIn 0.2s ease; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 4px; color: var(--cyan); margin-bottom: 6px; }
  .modal h2 { font-family: var(--ui); font-weight: 800; font-size: 18px; margin-bottom: 6px; }
  .modal-uid { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 20px; padding: 8px; background: var(--bg); border: 1px solid var(--border); word-break: break-all; }
  .form-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; display: block; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-bottom: 2px solid var(--cyan); color: var(--text); font-family: var(--ui); font-size: 15px; padding: 10px 12px; outline: none; margin-bottom: 8px; transition: border-color 0.2s; }
  .form-input:focus { border-bottom-color: var(--green); }
  .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .emoji-btn { width: 36px; height: 36px; background: var(--bg); border: 1px solid var(--border); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .emoji-btn:hover, .emoji-btn.selected { border-color: var(--cyan); background: rgba(0,229,255,0.1); }
  .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .btn-primary { padding: 12px; background: var(--cyan); border: none; color: var(--bg); font-family: var(--mono); font-size: 12px; letter-spacing: 3px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
  .btn-primary:hover { background: var(--green); box-shadow: 0 0 20px rgba(0,255,140,0.3); }
  .btn-secondary { padding: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--red); color: var(--red); }

  /* Write progress */
  .write-status { font-family: var(--mono); font-size: 11px; padding: 10px; background: var(--bg); border: 1px solid var(--border); margin-bottom: 16px; display: none; text-align: center; }
  .write-status.visible { display: block; }
  .write-status.writing { color: var(--orange); border-color: var(--orange); animation: pulse 1s infinite; }
  .write-status.done { color: var(--green); border-color: var(--green); }
  .write-status.fail { color: var(--red); border-color: var(--red); }

  /* Detail modal */
  .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .detail-val { font-family: var(--mono); font-size: 11px; color: var(--text); text-align: right; word-break: break-all; max-width: 60%; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--cyan); color: var(--text); font-family: var(--mono); font-size: 12px; letter-spacing: 2px; padding: 12px 20px; z-index: 2000; transition: transform 0.3s ease; white-space: nowrap; box-shadow: 0 0 20px rgba(0,229,255,0.2); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error-t { border-color: var(--red); }

  .scan-waves { display: inline-flex; align-items: center; gap: 6px; }
  .wave-ring { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .scanning .wave-ring:nth-child(1) { animation: wave 1s 0s infinite; }
  .scanning .wave-ring:nth-child(2) { animation: wave 1s 0.2s infinite; }
  .scanning .wave-ring:nth-child(3) { animation: wave 1s 0.4s infinite; }
  @keyframes wave { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(0.3);opacity:0.3} }

  /* Pill badge */
  .written-badge { display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 2px; padding: 2px 7px; border: 1px solid var(--green); color: var(--green); vertical-align: middle; margin-left: 6px; }
  .unwritten-badge { display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 2px; padding: 2px 7px; border: 1px solid var(--muted); color: var(--muted); vertical-align: middle; margin-left: 6px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-badge">NTAG 213</div>
    <h1>NFC TAG<br><span>DATABASE</span></h1>
    <p class="header-sub">GESTIONNAIRE DE TAGS NFC</p>
    <div class="header-line"></div>
  </header>

  <div class="nfc-unsupported" id="nfc-unsupported">
    ⚠ WEB NFC NON SUPPORTÉ — Utilisez Chrome sur Android pour scanner et écrire des tags.
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Prêt.</span>
  </div>

  <button class="scan-btn" id="scan-btn" onclick="toggleScan()">
    <span id="scan-label">
      <span class="scan-waves">
        <span class="wave-ring"></span><span class="wave-ring"></span><span class="wave-ring"></span>
      </span>
      &nbsp;&nbsp;SCANNER UN TAG
    </span>
  </button>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">TAGS ENREG.</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-today">0</div><div class="stat-label">AJOUTÉS AUJ.</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-scanned">0</div><div class="stat-label">SCANS TOTAL</div></div>
  </div>

  <div class="section-title">TAGS ENREGISTRÉS</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Rechercher..." oninput="filterTags()" />
  </div>
  <div id="tag-list"></div>
</div>

<!-- Modal : enregistrement / édition -->
<div class="modal-overlay" id="register-modal">
  <div class="modal">
    <div class="modal-badge" id="modal-badge">NOUVEAU TAG DÉTECTÉ</div>
    <h2 id="modal-title">Enregistrer ce tag</h2>
    <div class="modal-uid" id="modal-uid">UID: —</div>

    <label class="form-label">NOM DU TAG</label>
    <input type="text" class="form-input" id="tag-name-input" placeholder="Ex : Câble chargeur bureau" maxlength="60"
           onkeydown="if(event.key==='Enter') saveTag()" />

    <label class="form-label" style="margin-top:12px">ICÔNE</label>
    <div class="emoji-row" id="emoji-row"></div>

    <!-- Statut écriture -->
    <div class="write-status" id="write-status"></div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">ANNULER</button>
      <button class="btn-primary" id="save-btn" onclick="saveTag()">SAUVEGARDER</button>
    </div>
  </div>
</div>

<!-- Modal : détail -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-badge">TAG RECONNU</div>
    <h2 id="detail-name" style="font-size:20px;color:var(--green);margin-bottom:16px"></h2>
    <div id="detail-rows"></div>
    <div class="modal-actions" style="margin-top:20px">
      <button class="btn-secondary" onclick="closeDetailModal()">FERMER</button>
      <button class="btn-primary" onclick="editFromDetail()">MODIFIER</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
// ⚠️ Change cette URL si tu renommes ton dépôt GitHub
const APP_URL = window.location.origin + window.location.pathname.replace(/\/$/, '');

const DB_KEY = 'nfc_tag_db_v3';
const STATS_KEY = 'nfc_stats_v3';

// ─── DATA ──────────────────────────────────────────────────────────────────
function loadDB() { try { return JSON.parse(localStorage.getItem(DB_KEY)) || {}; } catch { return {}; } }
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function loadStats() { try { return JSON.parse(localStorage.getItem(STATS_KEY)) || { totalScans: 0 }; } catch { return { totalScans: 0 }; } }
function saveStats(s) { localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

const EMOJIS = ['📦','🔌','💡','🔑','🗝️','📱','💻','🖥️','🎧','🎮','📷','🚗','🧳','🏠','📚','🗂️','🔧','🔩','💊','🎁','🛒','🎵','🏋️','🐾'];

// ─── STATE ─────────────────────────────────────────────────────────────────
let isScanning = false;
let nfcReader = null;
let currentUID = null;
let editUID = null;
let selectedEmoji = '📦';
let detailUID = null;
let pendingWriteUID = null; // UID à écrire sur le tag après save

// ─── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildEmojiPicker();
  renderList();
  updateStats();

  if (!('NDEFReader' in window)) {
    document.getElementById('nfc-unsupported').style.display = 'block';
  }

  // 🔑 Vérifier si on arrive depuis un scan de tag (URL contient ?uid=...)
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('uid');
  if (uid) {
    // Nettoyer l'URL sans recharger
    history.replaceState({}, '', window.location.pathname);
    handleTagFromURL(uid.toUpperCase());
  }
});

// ─── ARRIVÉE DEPUIS UN TAG SCANNÉ ─────────────────────────────────────────
function handleTagFromURL(uid) {
  const db = loadDB();
  const stats = loadStats();
  stats.totalScans = (stats.totalScans || 0) + 1;
  saveStats(stats);
  updateStats();

  if (db[uid]) {
    // Tag connu → afficher les infos directement
    db[uid].lastSeen = new Date().toISOString();
    db[uid].scanCount = (db[uid].scanCount || 0) + 1;
    saveDB(db);
    renderList();
    setStatus('active', `✓ Tag reconnu : ${db[uid].name}`);
    openDetailModal(uid);
  } else {
    // Tag vierge (URL dessus mais pas dans la base) → demander un nom
    setStatus('active', `◈ Nouveau tag : ${uid}`);
    openRegisterModal(uid, false, false);
  }
}

// ─── SCAN MANUEL (bouton) ─────────────────────────────────────────────────
async function toggleScan() {
  if (!('NDEFReader' in window)) {
    openRegisterModal(generateFakeUID(), true, false);
    return;
  }
  if (isScanning) { stopScan(); return; }
  startScan();
}

async function startScan() {
  try {
    nfcReader = new NDEFReader();
    await nfcReader.scan();
    isScanning = true;
    setScanUI(true);
    setStatus('active', '⟳ En attente d\'un tag… Approchez votre tag.');

    nfcReader.addEventListener('reading', ({ serialNumber, message }) => {
      const uid = serialNumber.toUpperCase();
      handleTagScan(uid, message);
    });
    nfcReader.addEventListener('readingerror', () => {
      setStatus('error', '✕ Erreur de lecture — réessayez.');
    });
  } catch(e) {
    setStatus('error', '✕ ' + (e.message || 'Permission refusée'));
    setScanUI(false);
  }
}

function stopScan() {
  isScanning = false;
  setScanUI(false);
  setStatus('', 'Scan arrêté.');
  nfcReader = null;
}

function handleTagScan(uid, message) {
  const db = loadDB();
  const stats = loadStats();
  stats.totalScans = (stats.totalScans || 0) + 1;
  saveStats(stats);
  updateStats();

  if (db[uid]) {
    db[uid].lastSeen = new Date().toISOString();
    db[uid].scanCount = (db[uid].scanCount || 0) + 1;
    saveDB(db);
    renderList();
    setStatus('active', `✓ Tag reconnu : ${db[uid].name}`);
    openDetailModal(uid);
  } else {
    setStatus('active', `◈ Nouveau tag détecté : ${uid}`);
    // Tag vierge → demander un nom, et on écrira l'URL dessus
    pendingWriteUID = uid;
    openRegisterModal(uid, false, true);
  }
}

// ─── MODAL ENREGISTREMENT ─────────────────────────────────────────────────
function openRegisterModal(uid, manual, willWrite) {
  currentUID = uid;
  editUID = null;
  pendingWriteUID = willWrite ? uid : null;

  document.getElementById('modal-badge').textContent = manual ? 'AJOUT MANUEL' : 'NOUVEAU TAG DÉTECTÉ';
  document.getElementById('modal-title').textContent = 'Enregistrer ce tag';
  document.getElementById('modal-uid').textContent = 'UID : ' + uid;
  document.getElementById('tag-name-input').value = '';
  document.getElementById('write-status').className = 'write-status';
  document.getElementById('write-status').textContent = '';

  if (willWrite) {
    document.getElementById('write-status').className = 'write-status visible writing';
    document.getElementById('write-status').textContent = '✎ Le lien sera écrit sur le tag après sauvegarde';
  }

  selectedEmoji = '📦';
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.textContent === '📦'));
  document.getElementById('register-modal').classList.add('open');
  setTimeout(() => document.getElementById('tag-name-input').focus(), 100);
}

function openEditModal(uid) {
  const db = loadDB();
  const tag = db[uid];
  if (!tag) return;
  currentUID = uid;
  editUID = uid;
  pendingWriteUID = null;

  document.getElementById('modal-badge').textContent = 'MODIFIER LE TAG';
  document.getElementById('modal-title').textContent = 'Modifier';
  document.getElementById('modal-uid').textContent = 'UID : ' + uid;
  document.getElementById('tag-name-input').value = tag.name;
  document.getElementById('write-status').className = 'write-status';

  selectedEmoji = tag.emoji || '📦';
  document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.textContent === selectedEmoji));
  document.getElementById('register-modal').classList.add('open');
  setTimeout(() => document.getElementById('tag-name-input').focus(), 100);
}

function closeModal() {
  document.getElementById('register-modal').classList.remove('open');
  currentUID = null; editUID = null; pendingWriteUID = null;
}

// ─── SAUVEGARDE + ÉCRITURE SUR LE TAG ─────────────────────────────────────
async function saveTag() {
  const name = document.getElementById('tag-name-input').value.trim();
  if (!name) {
    document.getElementById('tag-name-input').style.borderBottomColor = 'var(--red)';
    setTimeout(() => document.getElementById('tag-name-input').style.borderBottomColor = '', 1000);
    return;
  }

  const uid = currentUID;
  const isEdit = !!editUID;
  const db = loadDB();

  if (isEdit) {
    db[uid].name = name;
    db[uid].emoji = selectedEmoji;
    db[uid].updatedAt = new Date().toISOString();
  } else {
    db[uid] = {
      name, emoji: selectedEmoji, uid,
      createdAt: new Date().toISOString(),
      lastSeen: new Date().toISOString(),
      scanCount: 1,
      written: false
    };
  }

  // Écrire l'URL sur le tag si NFC disponible et tag physique scanné
  if (pendingWriteUID && 'NDEFReader' in window) {
    const tagURL = `${APP_URL}?uid=${uid}`;
    const ws = document.getElementById('write-status');
    ws.className = 'write-status visible writing';
    ws.textContent = '✎ Approchez le tag pour y écrire le lien…';
    document.getElementById('save-btn').disabled = true;

    try {
      const writer = new NDEFReader();
      await writer.write({ records: [{ recordType: 'url', data: tagURL }] });
      db[uid].written = true;
      ws.className = 'write-status visible done';
      ws.textContent = '✓ Lien écrit sur le tag avec succès !';
      saveDB(db);
      renderList();
      updateStats();
      setTimeout(() => {
        closeModal();
        showToast('✓ Tag enregistré et lien écrit !', 'success');
        highlightCard(uid);
      }, 1200);
    } catch(e) {
      ws.className = 'write-status visible fail';
      ws.textContent = '✕ Écriture échouée — tag quand même enregistré.';
      saveDB(db);
      renderList();
      updateStats();
      document.getElementById('save-btn').disabled = false;
      setTimeout(() => {
        closeModal();
        showToast('Tag enregistré (écriture NFC échouée)', '');
        highlightCard(uid);
      }, 2000);
    }
  } else {
    saveDB(db);
    renderList();
    updateStats();
    closeModal();
    showToast(isEdit ? '✓ Tag modifié' : '✓ Tag enregistré', 'success');
    highlightCard(uid);
  }
}

function highlightCard(uid) {
  setTimeout(() => {
    const card = document.querySelector(`[data-uid="${uid}"]`);
    if (card) { card.classList.add('highlight'); setTimeout(() => card.classList.remove('highlight'), 2000); }
  }, 100);
}

// ─── MODAL DÉTAIL ─────────────────────────────────────────────────────────
function openDetailModal(uid) {
  const db = loadDB();
  const tag = db[uid];
  if (!tag) return;
  detailUID = uid;

  document.getElementById('detail-name').textContent = (tag.emoji || '📦') + '  ' + tag.name;
  const rows = [
    ['UID', uid],
    ['LIEN ÉCRIT', tag.written ? '✓ Oui' : '✕ Non'],
    ['ENREGISTRÉ', formatDate(tag.createdAt)],
    ['DERNIER SCAN', formatDate(tag.lastSeen)],
    ['NB. SCANS', tag.scanCount || 1],
  ];
  document.getElementById('detail-rows').innerHTML = rows.map(([k,v]) =>
    `<div class="detail-row"><span class="detail-key">${k}</span><span class="detail-val">${v}</span></div>`
  ).join('');
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
  detailUID = null;
}

function editFromDetail() {
  const uid = detailUID;
  closeDetailModal();
  openEditModal(uid);
}

// ─── DELETE ───────────────────────────────────────────────────────────────
function deleteTag(uid) {
  const db = loadDB();
  const name = db[uid]?.name || uid;
  if (!confirm(`Supprimer le tag "${name}" ?`)) return;
  delete db[uid];
  saveDB(db);
  renderList();
  updateStats();
  showToast('🗑 Tag supprimé', 'error-t');
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderList(filter = '') {
  const db = loadDB();
  const list = document.getElementById('tag-list');
  const keys = Object.keys(db).filter(uid => {
    if (!filter) return true;
    return db[uid].name.toLowerCase().includes(filter.toLowerCase()) || uid.toLowerCase().includes(filter.toLowerCase());
  });

  if (keys.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📡</div>AUCUN TAG ENREGISTRÉ<br><br>Scannez un tag pour commencer.</div>`;
    return;
  }

  keys.sort((a,b) => new Date(db[b].createdAt) - new Date(db[a].createdAt));
  list.innerHTML = keys.map(uid => {
    const t = db[uid];
    const badge = t.written
      ? `<span class="written-badge">LIEN ✓</span>`
      : `<span class="unwritten-badge">SANS LIEN</span>`;
    return `
      <div class="tag-card" data-uid="${uid}">
        <div class="tag-icon">${t.emoji || '📦'}</div>
        <div class="tag-info">
          <div class="tag-name">${escHtml(t.name)}${badge}</div>
          <div class="tag-uid">${uid}</div>
          <div class="tag-meta">${formatDate(t.createdAt)} · ${t.scanCount || 1} scan(s)</div>
        </div>
        <div class="tag-actions">
          <button class="btn-icon" title="Modifier" onclick="openEditModal('${uid}')">✏️</button>
          <button class="btn-icon delete" title="Supprimer" onclick="deleteTag('${uid}')">🗑</button>
        </div>
      </div>`;
  }).join('');
}

function filterTags() { renderList(document.getElementById('search-input').value); }

function updateStats() {
  const db = loadDB();
  const keys = Object.keys(db);
  const today = new Date().toDateString();
  document.getElementById('stat-total').textContent = keys.length;
  document.getElementById('stat-today').textContent = keys.filter(uid => new Date(db[uid].createdAt).toDateString() === today).length;
  document.getElementById('stat-scanned').textContent = loadStats().totalScans || 0;
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────
function setScanUI(active) {
  const btn = document.getElementById('scan-btn');
  const label = document.getElementById('scan-label');
  const waves = `<span class="scan-waves"><span class="wave-ring"></span><span class="wave-ring"></span><span class="wave-ring"></span></span>`;
  btn.classList.toggle('scanning', active);
  label.innerHTML = waves + (active ? '&nbsp;&nbsp;APPROCHEZ UN TAG' : '&nbsp;&nbsp;SCANNER UN TAG');
}

function setStatus(type, msg) {
  document.getElementById('status-dot').className = 'status-dot' + (type ? ' ' + type : '');
  document.getElementById('status-text').textContent = msg;
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast', 3000);
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }) + ' ' +
         d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function generateFakeUID() { return Array.from({length:7}, ()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0').toUpperCase()).join(':'); }

function buildEmojiPicker() {
  const row = document.getElementById('emoji-row');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => { selectedEmoji = e; document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('selected', b.textContent === e)); };
    row.appendChild(btn);
  });
}

document.getElementById('register-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.getElementById('detail-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeDetailModal(); });
</script>
</body>
